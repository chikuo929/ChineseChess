<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>&#26497;&#31616;&#22312;&#32447;&#35937;&#26827;</title>
    <link rel="stylesheet" href="/style.css?v=5" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>&#26497;&#31616;&#22312;&#32447;&#35937;&#26827;</h1>
          <p id="roomLabel">&#25151;&#38388;</p>
        </div>
        <div class="actions">
          <span id="status">&#36830;&#25509;&#20013;...</span>
          <button id="viewButton" type="button">&#20999;&#25442;&#35270;&#35282;</button>
          <button id="annotationModeButton" type="button" aria-pressed="false">&#35762;&#35299;&#27169;&#24335;</button>
          <button id="undoButton" type="button" disabled>&#36864;&#19968;&#27493;</button>
          <button id="copyLinkButton" type="button">&#22797;&#21046;&#25151;&#38388;&#38142;&#25509;</button>
          <button id="resetButton" type="button">&#37325;&#32622;&#26827;&#30424;</button>
          <button id="imageSetupButton" type="button">&#22270;&#29255;&#25670;&#23616;</button>
          <button id="setupButton" type="button">&#24067;&#32622;&#27531;&#23616;</button>
          <div id="setupActions" class="setup-actions" hidden>
            <button id="clearSetupButton" type="button">&#28165;&#31354;&#26827;&#30424;</button>
            <button id="standardSetupButton" type="button">&#24674;&#22797;&#26631;&#20934;&#24320;&#23616;</button>
            <button id="finishSetupButton" type="button">&#23436;&#25104;&#24067;&#32622;</button>
            <button id="cancelSetupButton" type="button">&#21462;&#28040;&#24067;&#32622;</button>
          </div>
          <span id="imageSetupStatus" class="image-setup-status" aria-live="polite"></span>
        </div>
      </header>

      <section id="annotationToolbar" class="annotation-toolbar" aria-label="&#35762;&#35299;&#24037;&#20855;" hidden>
        <span class="annotation-hint">&#25302;&#21160;&#26827;&#30424;&#30011;&#31661;&#22836;&#25110;&#22280;&#36873;&#37325;&#28857;</span>
        <div class="annotation-tool-group" role="group" aria-label="&#26631;&#27880;&#31867;&#22411;">
          <button class="annotation-tool active" data-tool="arrow" type="button" aria-pressed="true">&#31661;&#22836;</button>
          <button class="annotation-tool" data-tool="circle" type="button" aria-pressed="false">&#22280;&#36873;</button>
        </div>
        <div class="annotation-tool-group" role="group" aria-label="&#26631;&#27880;&#39068;&#33394;">
          <button class="color-tool red active" data-color="red" type="button" aria-label="&#32418;&#33394;" aria-pressed="true"></button>
          <button class="color-tool blue" data-color="blue" type="button" aria-label="&#34013;&#33394;" aria-pressed="false"></button>
        </div>
        <button id="undoAnnotationButton" type="button" disabled>&#25764;&#38144;&#26631;&#27880;</button>
        <button id="clearAnnotationsButton" type="button" disabled>&#28165;&#38500;&#20840;&#37096;</button>
      </section>

      <section class="game">
        <aside class="captured-panel">
          <h2>&#32418;&#26041;&#26827;&#23376;&#21306;</h2>
          <div id="redCaptured" class="captured-list"></div>
        </aside>

        <section class="board-wrap">
          <div id="board" class="board" aria-label="&#20013;&#22269;&#35937;&#26827;&#26827;&#30424;">
            <div class="river"><span class="river-text">&#26970;&#27827;&nbsp;&nbsp;&nbsp;&nbsp;&#27721;&#30028;</span></div>
          </div>
        </section>

        <aside class="captured-panel">
          <h2>&#40657;&#26041;&#26827;&#23376;&#21306;</h2>
          <div id="blackCaptured" class="captured-list"></div>
        </aside>
      </section>
    </main>

    <div id="imageSetupDialog" class="image-setup-overlay" role="dialog" aria-modal="true" aria-labelledby="imageSetupTitle" aria-describedby="imageSetupHint" hidden>
      <section class="image-setup-dialog">
        <header class="image-setup-dialog-header">
          <div>
            <h2 id="imageSetupTitle">上传棋盘截图</h2>
            <p id="imageSetupHint">支持固定平台截图；可以裁剪和缩放，但需要保留完整、清晰的棋盘和棋子。</p>
          </div>
          <button id="closeImageSetupButton" class="image-setup-close" type="button" aria-label="关闭图片上传">×</button>
        </header>

        <label id="imageDropZone" class="image-drop-zone" for="imageSetupInput" tabindex="0">
          <span class="image-drop-icon" aria-hidden="true">⇧</span>
          <strong>把棋盘截图拖到这里</strong>
          <span>或者点击此区域选择图片</span>
          <small>支持 PNG、JPG、WebP，最大 15 MB</small>
        </label>
        <input id="imageSetupInput" type="file" accept="image/png,image/jpeg,image/webp" hidden />

        <div class="image-setup-dialog-actions">
          <button id="cancelImageSetupButton" type="button">取消</button>
        </div>
      </section>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script async src="/vendor/opencv.js"></script>
    <script src="/image-recognizer.js?v=4"></script>
    <script src="/app.js?v=5"></script>
  </body>
</html>
